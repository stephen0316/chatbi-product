services:
  product-huizhen:
    build:
      context: .
      dockerfile: Dockerfile
    image: product-huizhen:latest
    container_name: product-huizhen
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      PYTHON_BIN: /opt/product-huizhen-venv/bin/python
      CHATBI_STORAGE_DIR: /app/storage
    ports:
      - "3001:3000"
    volumes:
      - product-huizhen-storage:/app/storage

volumes:
  product-huizhen-storage:
